<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
VM Provisioning Micro App
</title>


<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/theme.css">

</head>


<body>


<header>


<h2>
Provisioning VM
</h2>



<nav>


<a href="#">
VM Creation (OVA)
</a>



<button id="themeToggle">

🌙 Toggle Dark Mode

</button>



</nav>


</header>








<section class="hero">


<h1 id="greeting">

Greetings DSTA!

</h1>



<p>

This Micro App is intended to provision VM.

</p>


</section>








<div id="vmContainer" class="container">





<!-- ===============================
     VM CARD
================================ -->



<div class="vm-card">





<h3 class="vm-title">

VM #1 - Provision Virtual Machine

</h3>







<form>






<!-- VM NAME -->


<div class="form-group">


<label>

VM Name

</label>



<input

type="text"

class="vmName"

placeholder="Enter VM Name"

required>


</div>










<!-- IP ADDRESS -->


<div class="form-group">


<label>

IP Address

</label>



<input

type="text"

class="ipAddress"

placeholder="Enter IP Address"

required>


</div>









<!-- OPERATING SYSTEM -->


<div class="form-group">


<label>

Operating System

</label>



<select

class="os"

required>



<option value="">

-- Select Operating System --

</option>



<option>

Ubuntu 24.04

</option>



<option>

Ubuntu 22.04

</option>



<option>

Windows Server 2022

</option>



<option>

Windows Server 2019

</option>



<option>

Red Hat Enterprise Linux 9

</option>



</select>


</div>









<!-- CPU -->


<div class="form-group">


<label>

CPU (vCPU)

</label>



<input

type="number"

class="cpu"

placeholder="Enter CPU cores"

min="1"

required>


</div>









<!-- RAM -->


<div class="form-group">


<label>

RAM (GB)

</label>



<input

type="number"

class="ram"

placeholder="Enter RAM size"

min="1"

required>


</div>









<!-- HARD DISKS -->


<div class="form-group">


<label>

Hard Disks

</label>






<div class="disk-container">







<div class="disk-row">


<label class="disk-label">

C:

</label>



<input

type="number"

class="disk-size"

placeholder="GB"

required>


</div>









<div class="disk-row">


<label class="disk-label">

D:

</label>



<input

type="number"

class="disk-size"

placeholder="GB"

required>


</div>









<div class="disk-row">


<label class="disk-label">

E:

</label>



<input

type="number"

class="disk-size"

placeholder="GB"

required>





<button

type="button"

class="add-disk-btn">

➕

</button>



</div>







</div>


</div>









<!-- CARD BUTTONS -->


<div class="button-group">


<button

type="button"

class="add-card-btn">


➕ Add Another VM


</button>






<button

type="button"

class="delete-card-btn">


🗑 Delete VM


</button>



</div>







</form>






</div>







</div>









<!-- ===============================
     SINGLE PROVISION BUTTON
================================ -->


<div class="provision-section">


<button

type="button"

id="provisionBtn">


🚀 Provision VM


</button>


</div>









<footer>


<span id="year"></span>


© Defence Science Technology Agency (CIO Team)


</footer>









<script src="js/app.js"></script>

<script src="js/vm.js"></script>

<script src="js/export.js"></script>





</body>


</html>
